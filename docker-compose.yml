version: "3.9"

services:

  # ── BASE DE DATOS ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: honduletras_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: honduletras
      POSTGRES_USER: honduletras
      POSTGRES_PASSWORD: honduletras_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honduletras"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── BACKEND (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honduletras_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    volumes:
      # Hot reload: monta el código fuente en vivo
      - ./backend:/app
      # Persiste imágenes y PDFs subidos entre reinicios
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── FRONTEND (Astro) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: honduletras_frontend
    restart: unless-stopped
    environment:
      - PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      # Hot reload: monta src y public en vivo
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "4321:4321"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
