# ============================================================
# SISTEMA DE GESTIÓN PARA LIBRERÍA
# Docker Compose - Configuración Completa
# 
# COMANDO: docker-compose up -d
# ============================================================

version: '3.8'

services:
  # ==========================================================
  # BASE DE DATOS: PostgreSQL (solo para Docker)
  # ==========================================================
  db:
    image: postgres:16-alpine
    container_name: libreria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: libreria_user
      POSTGRES_PASSWORD: libreria_pass
      POSTGRES_DB: libreria_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libreria_user -d libreria_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - libreria-network

  # ==========================================================
  # BACKEND: FastAPI + Python 3.13
  # ==========================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: libreria-backend
    restart: unless-stopped
    environment:
      # Usar PostgreSQL cuando se ejecuta con Docker
      DATABASE_URL: postgresql://libreria_user:libreria_pass@db:5432/libreria_db
      SECRET_KEY: tu-clave-secreta-super-segura-cambia-esto-en-produccion
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - libreria-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ==========================================================
  # FRONTEND: Astro
  # ==========================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: libreria-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "4321:4321"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - libreria-network
    command: npm run dev -- --host

# ============================================================
# VOLÚMENES
# ============================================================
volumes:
  postgres_data:
    driver: local

# ============================================================
# REDES
# ============================================================
networks:
  libreria-network:
    driver: bridge
